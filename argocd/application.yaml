apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: bookmytrip-dev
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/SurendraKumar17/microservices-cd-platform
    targetRevision: main
    path: helm/booking-app
    helm:
      valueFiles:
        - values.yaml
        - ../../gitops/environments/dev/values.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: app-dev
  resourceHealthCustomization:
    - group: networking.k8s.io
      kind: Ingress
      health.lua: |
        hs = {}
        hs.status = "Healthy"
        hs.message = "Ingress health skipped - ALB provisioning is async"
        return hs
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
    syncOptions:
      - CreateNamespace=true
      - SkipDryRunOnMissingResource=true
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cluster-infra
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/SurendraKumar17/microservices-cd-platform
    targetRevision: main
    path: gitops/cluster-wide
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - SkipDryRunOnMissingResource=true