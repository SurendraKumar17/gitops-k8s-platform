{{- range $service := list "auth" "book" "search" "payment" "notification" "frontend" }}
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: {{ $.Release.Name }}-{{ $service }}-pdb
  labels:
    {{- include "booking.labels" $ | nindent 4 }}
spec:
  maxUnavailable: {{ $.Values.pdb.maxUnavailable }}
  selector:
    matchLabels:
      app: {{ $service }}
{{- end }}