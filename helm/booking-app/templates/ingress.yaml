apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ .Release.Name }}-ingress
  labels:
    {{- include "booking.labels" . | nindent 4 }}
  annotations:
    {{- toYaml .Values.ingress.annotations | nindent 4 }}
spec:
  ingressClassName: {{ .Values.ingress.className }}
  rules:
  - http:   # removed host (important for ALB DNS access)
      paths:

      - path: /api/users
        pathType: Prefix
        backend:
          service:
            name: {{ .Release.Name }}-user
            port:
              number: 3002

      - path: /api/search
        pathType: Prefix
        backend:
          service:
            name: {{ .Release.Name }}-search
            port:
              number: 3003

      - path: /api/bookings        # ← was /api/book, must match actual route
        pathType: Prefix
        backend:
          service:
            name: {{ .Release.Name }}-book
            port:
              number: 3001

      - path: /                    # catch-all must always be last
        pathType: Prefix
        backend:
          service:
            name: {{ .Release.Name }}-frontend
            port:
              number: 3000